<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* rendered locally to icon-512.png — never served under the CSP */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0F4C5C; }
  body { display: grid; place-items: center; }
  /* 12% safe padding each side -> mark fills the middle 76vmin (maskable-safe) */
  .mark { width: 76vmin; height: 76vmin; display: block; }
</style>
</head>
<body>
  <!-- the family dial + two "explainer" caption lines beneath -->
  <svg class="mark" viewBox="0 0 64 64" aria-hidden="true">
    <path d="M12 38 A20 20 0 0 1 52 38" fill="none" stroke="#F2E9D8" stroke-width="5.4" stroke-linecap="round"/>
    <line x1="12" y1="38" x2="12" y2="32" stroke="#F2E9D8" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="32" y1="18" x2="32" y2="24" stroke="#F2E9D8" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="52" y1="38" x2="52" y2="32" stroke="#F2E9D8" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="32" y1="38" x2="46" y2="27" stroke="#E0B26E" stroke-width="4.8" stroke-linecap="round"/>
    <circle cx="32" cy="38" r="4.4" fill="#E0B26E"/>
    <circle cx="32" cy="38" r="1.8" fill="#0F4C5C"/>
    <line x1="12" y1="50" x2="52" y2="50" stroke="#E0B26E" stroke-width="4.2" stroke-linecap="round"/>
    <line x1="12" y1="58" x2="38" y2="58" stroke="#7FA8B0" stroke-width="4.2" stroke-linecap="round"/>
  </svg>
</body>
</html>
